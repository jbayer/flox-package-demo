schema-version = "1.12.0"

## Runtime environment that consumes the published package.
##
## This environment contains no build tools and no source code — just the
## datecli binary installed from the FloxHub catalog.

[install]
datecli.pkg-path = "jbayer/datecli"
datecli.pkg-group = "datecli"

[options]
# The published package currently has variants for these systems; publish
# from other hosts (or CI runners) to add more.
systems = [
  "aarch64-darwin",
  "aarch64-linux",
]
